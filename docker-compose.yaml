version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: kefir-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kefir
      POSTGRES_DB: sso_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d sso_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kefir-network

  redis:
    image: redis:8-alpine
    container_name: kefir-redis
